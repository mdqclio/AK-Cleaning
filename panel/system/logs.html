<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Audit Log — AK Cleaning</title>
  <link rel="stylesheet" href="../../css/base.css" />
  <link rel="stylesheet" href="../../css/components.css" />
  <link rel="stylesheet" href="../css/panel.css" />
  <link rel="stylesheet" href="../clients/css/clients.css" />
  <style>
    .log-entry { font-family: monospace; font-size: var(--text-xs); color: var(--color-text-muted); }
    .log-action { font-weight: 700; color: var(--color-primary); }
    .log-table { font-size: var(--text-sm); color: var(--color-accent); }
  </style>
</head>
<body>

<div id="panel-shell"></div>

<div id="page-content">
  <div x-data="logsPage()" x-init="init()" class="content-inner">

    <div class="toolbar" style="margin-bottom:var(--space-md)">
      <div class="toolbar-left">
        <select class="select" x-model="filtroTabla" @change="cargar()">
          <option value="">All Tables</option>
          <option value="clientes">clientes</option>
          <option value="propiedades">propiedades</option>
          <option value="empleadas">empleadas</option>
          <option value="proveedores">proveedores</option>
          <option value="servicios">servicios</option>
          <option value="usuarios">usuarios</option>
        </select>
      </div>
      <div class="toolbar-right">
        <button class="btn btn-ghost btn-sm" @click="cargar()">
          <i data-lucide="refresh-cw"></i> Refresh
        </button>
      </div>
    </div>

    <div class="table-wrapper">
      <table class="table">
        <thead>
          <tr>
            <th>Timestamp</th>
            <th>Table</th>
            <th>Action</th>
            <th>User</th>
            <th>Record ID</th>
          </tr>
        </thead>
        <tbody>
          <template x-if="cargando">
            <template x-for="i in 8" :key="i">
              <tr>
                <td><div class="skeleton" style="width:130px;height:12px"></div></td>
                <td><div class="skeleton" style="width:80px;height:12px"></div></td>
                <td><div class="skeleton" style="width:60px;height:12px"></div></td>
                <td><div class="skeleton" style="width:100px;height:12px"></div></td>
                <td><div class="skeleton" style="width:200px;height:12px"></div></td>
              </tr>
            </template>
          </template>

          <template x-if="!cargando && logs.length === 0">
            <tr>
              <td colspan="5" class="empty-state">
                <i data-lucide="scroll-text"></i>
                <p>No audit log entries found.</p>
              </td>
            </tr>
          </template>

          <template x-if="!cargando && logs.length > 0">
            <template x-for="log in logs" :key="log.id">
              <tr>
                <td><span class="log-entry" x-text="formatFecha(log.created_at)"></span></td>
                <td><span class="log-table" x-text="log.tabla || '—'"></span></td>
                <td><span class="log-action" x-text="log.accion || '—'"></span></td>
                <td><span class="text-sm text-muted" x-text="log.usuario_id || '—'"></span></td>
                <td><span class="log-entry" x-text="log.registro_id || '—'"></span></td>
              </tr>
            </template>
          </template>
        </tbody>
      </table>
    </div>

  </div>
</div>

<script type="module">
  import { iniciarPanel } from '../js/panel-shell.js';
  import { supabase }     from '../../js/supabase-client.js';

  window.logsPage = function () {
    return {
      logs: [], cargando: true, filtroTabla: '',

      async init() { await this.cargar(); },

      async cargar() {
        this.cargando = true;
        let q = supabase.from('audit_log').select('*').order('created_at', { ascending: false }).limit(200);
        if (this.filtroTabla) q = q.eq('tabla', this.filtroTabla);
        const { data } = await q;
        this.logs = data || [];
        this.cargando = false;
        this.$nextTick(() => window.lucide?.createIcons());
      },

      formatFecha(iso) {
        if (!iso) return '—';
        return new Date(iso).toLocaleString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit', second: '2-digit' });
      },
    };
  };

  await import('https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js');

  (async () => {
    await iniciarPanel({
      rolesPermitidos: ['superadmin'],
      itemActivo: 'system-logs',
      tituloHeader: 'Audit Log',
    });
  })();
</script>
</body>
</html>
