<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Health — AK Cleaning</title>
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/panel/css/panel.css" />
  <style>
    .health-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: var(--space-md); margin-bottom: var(--space-lg); }
    .health-card { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius); padding: var(--space-md); }
    .health-card-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: var(--space-sm); }
    .health-card-title { font-weight: 600; color: var(--color-primary); font-size: var(--text-sm); }
    .health-dot { width: 10px; height: 10px; border-radius: 50%; }
    .health-dot.ok   { background: #22c55e; box-shadow: 0 0 0 3px rgba(34,197,94,.2); }
    .health-dot.warn { background: #f59e0b; box-shadow: 0 0 0 3px rgba(245,158,11,.2); }
    .health-dot.err  { background: #ef4444; box-shadow: 0 0 0 3px rgba(239,68,68,.2);  }
    .health-value { font-size: var(--text-2xl); font-weight: 700; color: var(--color-primary); font-variant-numeric: tabular-nums; }
    .health-label { font-size: var(--text-xs); color: var(--color-text-muted); margin-top: 2px; }
  </style>
</head>
<body>

<div id="panel-shell"></div>

<div id="page-content">
  <div x-data="healthPage()" x-init="init()" class="content-inner">

    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:var(--space-lg)">
      <p class="text-muted text-sm" x-text="lastCheck ? `Last checked: ${lastCheck}` : 'Checking…'"></p>
      <button class="btn btn-ghost btn-sm" @click="init()" :disabled="cargando">
        <i data-lucide="refresh-cw"></i> Refresh
      </button>
    </div>

    <div class="health-grid">

      <div class="health-card">
        <div class="health-card-header">
          <span class="health-card-title">Database</span>
          <div class="health-dot" :class="metricas.db ? 'ok' : 'err'"></div>
        </div>
        <div class="health-value" x-text="metricas.db ? 'Online' : 'Error'"></div>
        <div class="health-label">Supabase PostgreSQL</div>
      </div>

      <div class="health-card">
        <div class="health-card-header">
          <span class="health-card-title">Auth Service</span>
          <div class="health-dot" :class="metricas.auth ? 'ok' : 'err'"></div>
        </div>
        <div class="health-value" x-text="metricas.auth ? 'Online' : 'Error'"></div>
        <div class="health-label">Supabase Auth</div>
      </div>

      <div class="health-card">
        <div class="health-card-header">
          <span class="health-card-title">Clients</span>
          <div class="health-dot ok"></div>
        </div>
        <div class="health-value" x-text="metricas.clientes ?? '…'"></div>
        <div class="health-label">Total records</div>
      </div>

      <div class="health-card">
        <div class="health-card-header">
          <span class="health-card-title">Properties</span>
          <div class="health-dot ok"></div>
        </div>
        <div class="health-value" x-text="metricas.propiedades ?? '…'"></div>
        <div class="health-label">Total records</div>
      </div>

      <div class="health-card">
        <div class="health-card-header">
          <span class="health-card-title">Staff</span>
          <div class="health-dot ok"></div>
        </div>
        <div class="health-value" x-text="metricas.empleadas ?? '…'"></div>
        <div class="health-label">Total records</div>
      </div>

      <div class="health-card">
        <div class="health-card-header">
          <span class="health-card-title">Buildings</span>
          <div class="health-dot ok"></div>
        </div>
        <div class="health-value" x-text="metricas.edificios ?? '…'"></div>
        <div class="health-label">Total records</div>
      </div>

    </div>

  </div>
</div>

<script type="module">
  import { iniciarPanel } from '/panel/js/panel-shell.js';
  import { supabase }     from '/js/supabase-client.js';

  window.healthPage = function () {
    return {
      cargando: true, lastCheck: '', metricas: {},

      async init() {
        this.cargando = true;
        const tablas = ['clientes', 'propiedades', 'empleadas', 'edificios'];
        const resultados = {};

        // Auth check
        const { data: authData, error: authErr } = await supabase.auth.getUser();
        resultados.auth = !authErr && !!authData?.user;

        // DB + table counts
        const counts = await Promise.all(
          tablas.map(t => supabase.from(t).select('*', { count: 'exact', head: true }))
        );
        resultados.db = counts.every(r => !r.error);
        tablas.forEach((t, i) => { resultados[t] = counts[i].error ? '!' : (counts[i].count ?? 0); });

        this.metricas = resultados;
        this.lastCheck = new Date().toLocaleTimeString('en-US');
        this.cargando = false;
        this.$nextTick(() => window.lucide?.createIcons());
      },
    };
  };

  await import('https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js');

  (async () => {
    await iniciarPanel({
      rolesPermitidos: ['superadmin'],
      itemActivo: 'system-health',
      tituloHeader: 'System Health',
    });
  })();
</script>
</body>
</html>
