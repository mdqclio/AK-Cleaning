<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Configuration — AK Cleaning</title>
  <link rel="stylesheet" href="../../css/base.css" />
  <link rel="stylesheet" href="../../css/components.css" />
  <link rel="stylesheet" href="../css/panel.css" />
  <style>
    .config-section { background: var(--color-surface); border: 1px solid var(--color-border); border-radius: var(--radius); padding: var(--space-lg); margin-bottom: var(--space-md); }
    .config-section h3 { font-size: var(--text-base); font-weight: 600; color: var(--color-primary); margin-bottom: var(--space-md); padding-bottom: var(--space-sm); border-bottom: 1px solid var(--color-divider); }
    .config-row { display: flex; justify-content: space-between; align-items: center; padding: var(--space-sm) 0; border-bottom: 1px solid var(--color-divider); gap: var(--space-md); }
    .config-row:last-child { border-bottom: none; padding-bottom: 0; }
    .config-key { font-weight: 500; color: var(--color-primary); font-size: var(--text-sm); min-width: 180px; }
    .config-val { font-size: var(--text-sm); color: var(--color-text-muted); font-family: monospace; word-break: break-all; }
    .config-val.redacted { letter-spacing: 2px; color: var(--color-border); }
  </style>
</head>
<body>

<div id="panel-shell"></div>

<div id="page-content">
  <div x-data="configPage()" x-init="init()" class="content-inner">

    <div class="config-section">
      <h3>Company</h3>
      <template x-for="row in company" :key="row.key">
        <div class="config-row">
          <span class="config-key" x-text="row.key"></span>
          <span class="config-val" x-text="row.val"></span>
        </div>
      </template>
    </div>

    <div class="config-section">
      <h3>Supabase</h3>
      <template x-for="row in supabaseInfo" :key="row.key">
        <div class="config-row">
          <span class="config-key" x-text="row.key"></span>
          <span class="config-val" :class="row.redacted ? 'redacted' : ''"
            x-text="row.redacted ? '••••••••••••••••' : row.val"></span>
        </div>
      </template>
    </div>

    <div class="config-section">
      <h3>Roles</h3>
      <template x-for="row in roles" :key="row.key">
        <div class="config-row">
          <span class="config-key" x-text="row.key"></span>
          <span class="config-val" x-text="row.val"></span>
        </div>
      </template>
    </div>

    <div class="config-section">
      <h3>Runtime</h3>
      <template x-for="row in runtime" :key="row.key">
        <div class="config-row">
          <span class="config-key" x-text="row.key"></span>
          <span class="config-val" x-text="row.val"></span>
        </div>
      </template>
    </div>

  </div>
</div>

<script type="module">
  import { iniciarPanel } from '../js/panel-shell.js';
  import CONFIG           from '../../config.js';

  window.configPage = function () {
    return {
      company: [], supabaseInfo: [], roles: [], runtime: [],

      init() {
        this.company = [
          { key: 'Company Name', val: CONFIG.empresa?.nombre || '—' },
          { key: 'Tagline',      val: CONFIG.empresa?.tagline || '—' },
          { key: 'Location',     val: CONFIG.empresa?.ciudad || '—' },
          { key: 'Email',        val: CONFIG.empresa?.email || '—' },
          { key: 'Phone',        val: CONFIG.empresa?.telefono || '—' },
        ];

        this.supabaseInfo = [
          { key: 'Project URL', val: CONFIG.supabase?.url || '—' },
          { key: 'Anon Key',    val: CONFIG.supabase?.anonKey || '—', redacted: true },
        ];

        const rolList = CONFIG.roles || {};
        this.roles = Object.entries(rolList).map(([rol, cfg]) => ({
          key: rol,
          val: `redirect → ${cfg.redirect || '—'}`,
        }));

        this.runtime = [
          { key: 'User Agent',   val: navigator.userAgent },
          { key: 'Language',     val: navigator.language },
          { key: 'Online',       val: navigator.onLine ? 'Yes' : 'No' },
          { key: 'Loaded At',    val: new Date().toLocaleString('en-US') },
        ];

        this.$nextTick(() => window.lucide?.createIcons());
      },
    };
  };

  await import('https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js');

  (async () => {
    await iniciarPanel({
      rolesPermitidos: ['superadmin'],
      itemActivo: 'system-config',
      tituloHeader: 'Configuration',
    });
  })();
</script>
</body>
</html>
