<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Staff — AK Cleaning</title>
  <link rel="stylesheet" href="../../css/base.css" />
  <link rel="stylesheet" href="../../css/components.css" />
  <link rel="stylesheet" href="../css/panel.css" />
  <link rel="stylesheet" href="../clients/css/clients.css" />
  <link rel="stylesheet" href="css/staff.css" />
</head>
<body>

<div id="panel-shell"></div>

<div id="page-content">
  <div x-data="staffPage()" x-init="init()" class="content-inner">

    <!-- ── Toolbar ── -->
    <div class="toolbar">
      <div class="toolbar-left">
        <div class="search-box">
          <i data-lucide="search"></i>
          <input
            type="text"
            placeholder="Search by name, phone…"
            x-model="filtros.busqueda"
            @input.debounce.400ms="resetPagina()"
          />
        </div>

        <select class="select" x-model="filtros.estado" @change="resetPagina()">
          <option value="all">All Status</option>
          <option value="active">Active</option>
          <option value="inactive">Inactive</option>
        </select>

        <select class="select" x-model="filtros.tipo_contrato" @change="resetPagina()">
          <option value="all">All Contract Types</option>
          <option value="employee">Employee</option>
          <option value="contractor">Contractor</option>
          <option value="part-time">Part-time</option>
        </select>
      </div>

      <div class="toolbar-right">
        <button class="btn btn-primary btn-md" @click="abrirCrear()">
          <i data-lucide="user-plus"></i> New Staff Member
        </button>
      </div>
    </div>

    <!-- ── Table ── -->
    <div class="table-wrapper">
      <table class="table">
        <thead>
          <tr>
            <th>Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>Contract</th>
            <th>Role</th>
            <th>Services</th>
            <th>Status</th>
            <th></th>
          </tr>
        </thead>
        <tbody>

          <!-- Loading -->
          <template x-if="cargando">
            <template x-for="i in 5" :key="i">
              <tr>
                <td><div class="skeleton" style="width:120px;height:14px"></div></td>
                <td><div class="skeleton" style="width:160px;height:14px"></div></td>
                <td><div class="skeleton" style="width:100px;height:14px"></div></td>
                <td><div class="skeleton" style="width:80px;height:20px;border-radius:12px"></div></td>
                <td><div class="skeleton" style="width:70px;height:20px;border-radius:12px"></div></td>
                <td><div class="skeleton" style="width:140px;height:14px"></div></td>
                <td><div class="skeleton" style="width:60px;height:20px;border-radius:12px"></div></td>
                <td></td>
              </tr>
            </template>
          </template>

          <!-- Empty -->
          <template x-if="!cargando && empleadas.length === 0">
            <tr>
              <td colspan="8" class="empty-state">
                <i data-lucide="users"></i>
                <p x-text="filtros.busqueda || filtros.estado !== 'all' || filtros.tipo_contrato !== 'all'
                  ? 'No staff members match your filters.'
                  : 'No staff members yet. Add your first one.'"></p>
              </td>
            </tr>
          </template>

          <!-- Rows -->
          <template x-if="!cargando && empleadas.length > 0">
            <template x-for="emp in empleadas" :key="emp.id">
              <tr>
                <td>
                  <div class="staff-name">
                    <span x-text="`${emp.usuarios?.nombre} ${emp.usuarios?.apellido}`"></span>
                    <small x-show="emp.fecha_inicio" x-text="`Since ${formatearFecha(emp.fecha_inicio)}`"></small>
                  </div>
                </td>
                <td>
                  <span class="text-muted text-sm" x-text="emp.usuarios?.email || '—'"></span>
                </td>
                <td>
                  <span class="text-muted text-sm" x-text="emp.usuarios?.telefono || '—'"></span>
                </td>
                <td>
                  <span
                    class="badge"
                    :class="badgeContrato(emp.tipo_contrato)"
                    x-text="labelContrato(emp.tipo_contrato)"
                  ></span>
                </td>
                <td>
                  <span class="badge badge-type-individual" x-text="emp.usuarios?.rol || '—'"></span>
                </td>
                <td>
                  <span
                    class="text-sm text-muted"
                    x-text="(emp.tipos_servicio || []).length
                      ? emp.tipos_servicio.slice(0,2).join(', ') + (emp.tipos_servicio.length > 2 ? ` +${emp.tipos_servicio.length - 2}` : '')
                      : '—'"
                  ></span>
                </td>
                <td>
                  <span class="badge" :class="emp.usuarios?.activo ? 'badge-status-active' : 'badge-status-inactive'"
                    x-text="emp.usuarios?.activo ? 'Active' : 'Inactive'"></span>
                </td>
                <td>
                  <div class="row-actions">
                    <button class="btn-icon" title="Edit" @click="abrirEditar(emp)">
                      <i data-lucide="pencil"></i>
                    </button>
                    <button
                      class="btn-icon"
                      :class="emp.usuarios?.activo ? 'btn-icon-danger' : ''"
                      :title="emp.usuarios?.activo ? 'Deactivate' : 'Activate'"
                      @click="confirmarToggle(emp)"
                    >
                      <i :data-lucide="emp.usuarios?.activo ? 'user-x' : 'user-check'"></i>
                    </button>
                  </div>
                </td>
              </tr>
            </template>
          </template>

        </tbody>
      </table>
    </div>

    <!-- ── Pagination ── -->
    <div class="pagination" x-show="totalPaginas > 1">
      <button class="btn btn-ghost btn-sm" :disabled="pagina === 1" @click="irPagina(pagina - 1)">
        <i data-lucide="chevron-left"></i>
      </button>
      <span class="pagination-info" x-text="`Page ${pagina} of ${totalPaginas}`"></span>
      <button class="btn btn-ghost btn-sm" :disabled="pagina === totalPaginas" @click="irPagina(pagina + 1)">
        <i data-lucide="chevron-right"></i>
      </button>
    </div>

  </div><!-- /content-inner -->
</div><!-- /page-content -->


<!-- ════════════════════════════════════════════════════
     MODAL: Create / Edit Staff
════════════════════════════════════════════════════ -->
<div
  class="modal-overlay"
  x-data="staffPage()"
  x-show="$store.staffModal.abierto"
  x-cloak
  @click.self="cerrarModal()"
  style="display:none"
>
  <div class="modal">

    <div class="modal-header">
      <h2 class="modal-title" x-text="formData.id ? 'Edit Staff Member' : 'New Staff Member'"></h2>
      <button class="modal-close" @click="cerrarModal()">
        <i data-lucide="x"></i>
      </button>
    </div>

    <div class="modal-body">

      <!-- Account info box (edit only) -->
      <div class="account-info-box" x-show="formData.id">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        <strong> Account email cannot be changed</strong> once created.
        Use <em>Send Password Reset</em> to let the staff member set a new password.
      </div>

      <!-- ── Section: Personal Info ── -->
      <div class="form-section">
        <div class="form-section-title">Personal Information</div>

        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label required">First Name</label>
            <input class="input" type="text" x-model="formData.nombre" placeholder="Jane" />
          </div>
          <div class="form-group">
            <label class="form-label required">Last Name</label>
            <input class="input" type="text" x-model="formData.apellido" placeholder="Doe" />
          </div>
        </div>

        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label required">Email</label>
            <input
              class="input"
              type="email"
              x-model="formData.email"
              placeholder="jane@example.com"
              :disabled="!!formData.id"
              :class="{ 'input-disabled': !!formData.id }"
            />
          </div>
          <div class="form-group">
            <label class="form-label">Phone</label>
            <input class="input" type="tel" x-model="formData.telefono" placeholder="+1 (305) 000-0000" />
          </div>
        </div>
      </div>

      <!-- ── Section: Employment ── -->
      <div class="form-section">
        <div class="form-section-title">Employment Details</div>

        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label required">System Role</label>
            <select class="select" x-model="formData.rol">
              <option value="">— Select role —</option>
              <option value="admin">Admin</option>
              <option value="compras">Compras</option>
              <option value="empleada">Empleada</option>
              <option value="proveedor">Proveedor</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Contract Type</label>
            <select class="select" x-model="formData.tipo_contrato">
              <option value="">— Select type —</option>
              <option value="employee">Employee</option>
              <option value="contractor">Contractor</option>
              <option value="part-time">Part-time</option>
            </select>
          </div>
        </div>

        <div class="form-grid-2">
          <div class="form-group">
            <label class="form-label">Start Date</label>
            <input class="input" type="date" x-model="formData.fecha_inicio" />
          </div>
        </div>

        <div class="form-grid-2" x-show="verDinero">
          <div class="form-group">
            <label class="form-label">Hourly Rate (USD)</label>
            <input class="input" type="number" step="0.01" min="0" x-model="formData.tarifa_hora" placeholder="25.00" />
          </div>
        </div>
      </div>

      <!-- ── Section: Service Types (chips) ── -->
      <div class="form-section">
        <div class="form-section-title">Service Types</div>
        <div class="form-group" style="position:relative">
          <label class="form-label">Services this staff member performs</label>

          <div class="chips-container" @click="$refs.chipsInput.focus()">
            <template x-for="(chip, idx) in formData.tipos_servicio" :key="chip">
              <span class="chip">
                <span x-text="chip"></span>
                <button type="button" class="chip-remove" @click.stop="removeChip(idx)">&times;</button>
              </span>
            </template>
            <input
              type="text"
              class="chips-input"
              x-ref="chipsInput"
              x-model="chipInput"
              @input="filtrarSugerencias()"
              @keydown.enter.prevent="addChipFromInput()"
              @keydown.backspace="chipInput === '' && removeChip(formData.tipos_servicio.length - 1)"
              @focus="filtrarSugerencias()"
              @blur="setTimeout(() => mostrarSugerencias = false, 150)"
              placeholder="Type or select…"
            />
          </div>

          <!-- Suggestions dropdown -->
          <div class="chips-suggestions" x-show="mostrarSugerencias && sugerenciasFiltradas.length > 0">
            <template x-for="sug in sugerenciasFiltradas" :key="sug">
              <div
                class="chips-suggestion-item"
                @mousedown.prevent="addChip(sug)"
                x-text="sug"
              ></div>
            </template>
          </div>
        </div>
      </div>

      <!-- ── Section: Notes ── -->
      <div class="form-section">
        <div class="form-section-title">Notes</div>
        <div class="form-group">
          <textarea class="textarea" rows="3" x-model="formData.notas" placeholder="Internal notes…"></textarea>
        </div>
      </div>

      <!-- ── Section: Documents placeholder ── -->
      <div class="form-section" x-show="formData.id">
        <div class="form-section-title">Documents</div>
        <div class="doc-upload-placeholder">
          <i data-lucide="file-text"></i>
          <p>Document uploads coming soon.</p>
        </div>
      </div>

      <!-- ── Section: Account Actions (edit only) ── -->
      <div class="form-section" x-show="formData.id">
        <div class="form-section-title">Account</div>
        <div style="display:flex;align-items:center;gap:var(--space-md);flex-wrap:wrap">
          <button
            type="button"
            class="btn-send-reset"
            :disabled="enviandoReset"
            @click="enviarPasswordReset()"
          >
            <i data-lucide="mail"></i>
            <span x-text="enviandoReset ? 'Sending…' : 'Send Password Reset'"></span>
          </button>

          <!-- Status toggle -->
          <div style="display:flex;align-items:center;gap:8px;margin-left:auto">
            <span class="form-label" style="margin:0">Active</span>
            <button
              type="button"
              class="toggle-btn"
              :class="formData.activa ? 'toggle-on' : 'toggle-off'"
              @click="formData.activa = !formData.activa"
              :aria-checked="formData.activa"
              role="switch"
            >
              <span class="toggle-thumb"></span>
            </button>
          </div>
        </div>
      </div>

      <!-- Error -->
      <div class="alert alert-error" x-show="errorForm" x-text="errorForm" x-cloak></div>

    </div><!-- /modal-body -->

    <div class="modal-footer">
      <button class="btn btn-secondary btn-md" @click="cerrarModal()">Cancel</button>
      <button class="btn btn-primary btn-md" :disabled="guardando" @click="guardar()">
        <span x-show="guardando" class="spinner spinner-sm"></span>
        <span x-text="guardando ? 'Saving…' : (formData.id ? 'Save Changes' : 'Create Staff Member')"></span>
      </button>
    </div>

  </div><!-- /modal -->
</div><!-- /overlay -->


<!-- ── Toast ── -->
<div id="toast-container" style="position:fixed;bottom:24px;right:24px;z-index:9999;display:flex;flex-direction:column;gap:8px"></div>


<script type="module">
  import { iniciarPanel }    from '../js/panel-shell.js';
  import { puedeVerDinero }  from '../js/panel-config.js';
  import {
    listarEmpleadas, obtenerEmpleada, crearEmpleada, actualizarEmpleada,
    toggleEmpleadaActiva, reenviarPasswordReset,
    traducirError, formatearNombreEmpleada, TIPOS_SERVICIO_SUGERIDOS
  } from './js/staff-api.js';

  (async () => {
    const usuario = await iniciarPanel({
      rolesPermitidos: ['superadmin', 'owner', 'admin'],
      itemActivo: 'staff',
      tituloHeader: 'Staff',
    });
    if (!usuario) return;
    const VER_DINERO = puedeVerDinero(usuario.rol);

    const _modalStore = {
      abierto: false,
      datos: null,
      callbacks: { onGuardar: null, onCerrar: null }
    };

    window.staffPage = function () {
      return {
        verDinero: VER_DINERO,

        // ── Table state
        empleadas: [],
        cargando: true,
        total: 0,
        pagina: 1,
        porPagina: 20,
        filtros: { busqueda: '', estado: 'all', tipo_contrato: 'all' },

        // ── Modal state
        formData: {},
        errorForm: '',
        guardando: false,
        enviandoReset: false,

        // ── Chips state
        chipInput: '',
        mostrarSugerencias: false,
        sugerenciasFiltradas: [],
        tiposSugeridos: TIPOS_SERVICIO_SUGERIDOS,

        get totalPaginas() {
          return Math.max(1, Math.ceil(this.total / this.porPagina));
        },

        async init() {
          await this.cargar();
          this.$watch('filtros', () => this.cargar());
          this.$watch('pagina', () => this.cargar());
          window.addEventListener('staff:recarga', () => this.cargar());
          window.addEventListener('staff:abrirModal', (e) => {
            this.formData           = e.detail.formData;
            this.errorForm          = '';
            this.guardando          = false;
            this.enviandoReset      = false;
            this.chipInput          = '';
            this.mostrarSugerencias = false;
          });
        },

        async cargar() {
          this.cargando = true;
          const { data, count, error } = await listarEmpleadas({
            busqueda:       this.filtros.busqueda,
            estado:         this.filtros.estado,
            tipo_contrato:  this.filtros.tipo_contrato,
            pagina:         this.pagina,
            porPagina:      this.porPagina,
          });
          this.empleadas = data;
          this.total = count;
          this.cargando = false;
          this.$nextTick(() => window.lucide?.createIcons());
        },

        resetPagina() { this.pagina = 1; },
        irPagina(n)    { this.pagina = n; },

        _formDataVacio() {
          return {
            id: null,
            nombre: '', apellido: '', email: '', telefono: '',
            rol: 'empleada', tipo_contrato: '', fecha_inicio: '',
            tipos_servicio: [], notas: '', tarifa_hora: '', activa: true,
            _email_original: '',
          };
        },

        abrirCrear() {
          _modalStore.abierto = true;
          const fd = this._formDataVacio();
          this.formData = fd;
          this.errorForm = '';
          this.guardando = false;
          this.enviandoReset = false;
          this.chipInput = '';
          window.dispatchEvent(new CustomEvent('staff:abrirModal', { detail: { formData: fd } }));
          this.$nextTick(() => window.lucide?.createIcons());
        },

        async abrirEditar(emp) {
          _modalStore.abierto = true;
          const { empleada, error } = await obtenerEmpleada(emp.id);
          if (error || !empleada) { this.mostrarToast('Error loading staff member.', 'error'); return; }

          const fd = {
            id:              empleada.id,
            nombre:          empleada.usuarios?.nombre || '',
            apellido:        empleada.usuarios?.apellido || '',
            email:           empleada.usuarios?.email || '',
            telefono:        empleada.usuarios?.telefono || '',
            rol:             empleada.usuarios?.rol || 'empleada',
            tipo_contrato:   empleada.tipo_contrato || '',
            fecha_inicio:    empleada.fecha_inicio || '',
            tipos_servicio:  [...(empleada.tipos_servicio || [])],
            notas:           empleada.notas || '',
            tarifa_hora:     empleada.tarifa_hora ?? '',
            activa:          empleada.usuarios?.activo ?? true,
            _usuario_id:     empleada.usuario_id,
            _email_original: empleada.usuarios?.email || '',
          };
          this.formData = fd;
          this.errorForm = '';
          this.guardando = false;
          this.enviandoReset = false;
          this.chipInput = '';
          window.dispatchEvent(new CustomEvent('staff:abrirModal', { detail: { formData: fd } }));
          this.$nextTick(() => window.lucide?.createIcons());
        },

        cerrarModal() {
          _modalStore.abierto = false;
        },

        async guardar() {
          this.errorForm = '';
          if (!this.formData.nombre?.trim())   { this.errorForm = 'First name is required.'; return; }
          if (!this.formData.apellido?.trim()) { this.errorForm = 'Last name is required.'; return; }
          if (!this.formData.rol)              { this.errorForm = 'System role is required.'; return; }
          if (!this.formData.id && !this.formData.email?.trim()) {
            this.errorForm = 'Email is required.'; return;
          }

          this.guardando = true;
          let error;

          if (!this.formData.id) {
            const resultado = await crearEmpleada({
              email:          this.formData.email.trim(),
              rol:            this.formData.rol,
              nombre:         this.formData.nombre.trim(),
              apellido:       this.formData.apellido.trim(),
              telefono:       this.formData.telefono?.trim() || null,
              tipo_contrato:  this.formData.tipo_contrato || null,
              fecha_inicio:   this.formData.fecha_inicio || null,
              tipos_servicio: this.formData.tipos_servicio,
              notas:          this.formData.notas?.trim() || null,
              tarifa_hora:    this.formData.tarifa_hora === '' ? null : Number(this.formData.tarifa_hora),
            });
            error = resultado.error;
          } else {
            const resultado = await actualizarEmpleada(this.formData.id, {
              nombre:         this.formData.nombre.trim(),
              apellido:       this.formData.apellido.trim(),
              telefono:       this.formData.telefono?.trim() || null,
              tipo_contrato:  this.formData.tipo_contrato || null,
              fecha_inicio:   this.formData.fecha_inicio || null,
              tipos_servicio: this.formData.tipos_servicio,
              notas:          this.formData.notas?.trim() || null,
              tarifa_hora:    this.formData.tarifa_hora === '' ? null : Number(this.formData.tarifa_hora),
              rol:            this.formData.rol,
            });
            if (!resultado.error && this.formData.activa !== undefined) {
              const { error: toggleError } = await toggleEmpleadaActiva(this.formData.id, this.formData.activa);
              error = toggleError;
            } else {
              error = resultado.error;
            }
          }

          this.guardando = false;
          if (error) { this.errorForm = traducirError(error); return; }

          this.cerrarModal();
          this.mostrarToast(
            this.formData.id ? 'Staff member updated.' : 'Staff member created. Password reset email sent.',
            'success'
          );
          window.dispatchEvent(new Event('staff:recarga'));
        },

        confirmarToggle(emp) {
          const accion = emp.usuarios?.activo ? 'deactivate' : 'activate';
          if (!confirm(`${accion.charAt(0).toUpperCase() + accion.slice(1)} ${emp.usuarios?.nombre} ${emp.usuarios?.apellido}?`)) return;
          this._toggleActiva(emp.id, !emp.usuarios?.activo);
        },
        async _toggleActiva(id, activa) {
          const { error } = await toggleEmpleadaActiva(id, activa);
          if (error) { this.mostrarToast(traducirError(error), 'error'); return; }
          this.mostrarToast(activa ? 'Staff member activated.' : 'Staff member deactivated.', 'success');
          await this.cargar();
        },

        async enviarPasswordReset() {
          const email = this.formData._email_original || this.formData.email;
          if (!email) return;
          this.enviandoReset = true;
          const { error } = await reenviarPasswordReset(email);
          this.enviandoReset = false;
          if (error) { this.mostrarToast('Failed to send reset email.', 'error'); return; }
          this.mostrarToast('Password reset email sent.', 'success');
        },

        filtrarSugerencias() {
          const val = this.chipInput.trim().toLowerCase();
          this.sugerenciasFiltradas = this.tiposSugeridos.filter(s =>
            s.toLowerCase().includes(val) &&
            !this.formData.tipos_servicio.includes(s)
          );
          this.mostrarSugerencias = true;
        },
        addChip(val) {
          const v = val.trim();
          if (!v || this.formData.tipos_servicio.includes(v)) return;
          this.formData.tipos_servicio = [...this.formData.tipos_servicio, v];
          this.chipInput = '';
          this.mostrarSugerencias = false;
        },
        addChipFromInput() {
          if (this.chipInput.trim()) this.addChip(this.chipInput);
        },
        removeChip(idx) {
          if (idx < 0) return;
          this.formData.tipos_servicio = this.formData.tipos_servicio.filter((_, i) => i !== idx);
        },

        formatearFecha(iso) {
          if (!iso) return '';
          const d = new Date(iso + 'T00:00:00');
          return d.toLocaleDateString('en-US', { month: 'short', year: 'numeric' });
        },
        badgeContrato(tipo) {
          if (!tipo) return '';
          const map = {
            employee:    'badge-contract-employee',
            contractor:  'badge-contract-contractor',
            'part-time': 'badge-contract-parttime',
          };
          return map[tipo] || '';
        },
        labelContrato(tipo) {
          if (!tipo) return '—';
          const map = { employee: 'Employee', contractor: 'Contractor', 'part-time': 'Part-time' };
          return map[tipo] || tipo;
        },

        mostrarToast(msg, tipo = 'success') {
          const cont = document.getElementById('toast-container');
          if (!cont) return;
          const t = document.createElement('div');
          t.className = `toast toast-${tipo}`;
          t.textContent = msg;
          cont.appendChild(t);
          setTimeout(() => t.classList.add('toast-visible'), 10);
          setTimeout(() => {
            t.classList.remove('toast-visible');
            setTimeout(() => t.remove(), 300);
          }, 3500);
        },
      };
    };

    document.addEventListener('alpine:init', () => {
      Alpine.store('staffModal', _modalStore);
    });

    const Alpine = (await import('https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/module.esm.js')).default;
    window.Alpine = Alpine;
    Alpine.start();
  })();
</script>

</body>
</html>
