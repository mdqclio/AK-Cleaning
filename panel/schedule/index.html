<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Schedule — AK Cleaning</title>
  <link rel="stylesheet" href="/css/base.css" />
  <link rel="stylesheet" href="/css/components.css" />
  <link rel="stylesheet" href="/panel/css/panel.css" />
</head>
<body>

<div id="panel-shell"></div>

<div id="page-content">
  <div class="content-inner" style="display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:60vh;text-align:center;gap:var(--space-md)">
    <div style="width:64px;height:64px;border-radius:16px;background:var(--color-surface);border:1px solid var(--color-border);display:flex;align-items:center;justify-content:center;margin:0 auto">
      <i data-lucide="calendar-clock" style="width:32px;height:32px;color:var(--color-accent)"></i>
    </div>
    <h2 style="color:var(--color-primary);font-size:var(--text-xl)">Schedule</h2>
    <p style="color:var(--color-text-muted);max-width:400px;line-height:1.6">
      Calendar scheduling is under development.<br>
      This module will show weekly and monthly views of all assigned cleaning jobs.
    </p>
    <span class="badge badge-status-inactive" style="font-size:var(--text-sm);padding:6px 16px">Coming Soon</span>
  </div>
</div>

<script type="module">
  import { iniciarPanel } from '/panel/js/panel-shell.js';
  (async () => {
    await iniciarPanel({
      rolesPermitidos: ['superadmin', 'owner', 'admin'],
      itemActivo: 'schedule',
      tituloHeader: 'Schedule',
    });
    if (window.lucide) window.lucide.createIcons();
  })();
</script>
</body>
</html>
