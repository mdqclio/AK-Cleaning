<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Invoices · AK Cleaning &amp; Management</title>
  <link rel="stylesheet" href="../../css/base.css">
  <link rel="stylesheet" href="../../css/components.css">
  <link rel="stylesheet" href="../css/panel.css">
  <link rel="stylesheet" href="../clients/css/clients.css">
  <link rel="stylesheet" href="../orders/css/orders.css">
  <link rel="stylesheet" href="./css/invoices.css">
  <script src="../../config.js"></script>
  <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
  <div class="panel-layout">
    <aside class="sidebar" id="sidebar"></aside>
    <main class="main">
      <header class="header" id="header"></header>

      <div class="content">
        <div class="clients-page" x-data="invoicesPage()" x-init="init()" x-cloak>

          <!-- Tabs por estado -->
          <div class="view-tabs">
            <button class="view-tab" :class="vista === 'drafts'    ? 'active' : ''" @click="cambiarVista('drafts')">Drafts</button>
            <button class="view-tab" :class="vista === 'generated' ? 'active' : ''" @click="cambiarVista('generated')">Generated</button>
            <button class="view-tab" :class="vista === 'sent'      ? 'active' : ''" @click="cambiarVista('sent')">Sent</button>
            <button class="view-tab" :class="vista === 'paid'      ? 'active' : ''" @click="cambiarVista('paid')">Paid</button>
            <button class="view-tab" :class="vista === 'all'       ? 'active' : ''" @click="cambiarVista('all')">All</button>
          </div>

          <!-- Toolbar -->
          <div class="clients-toolbar">
            <div class="clients-search">
              <i data-lucide="search"></i>
              <input type="text" placeholder="Search by client name, invoice number or notes..."
                     x-model="busqueda" @input.debounce.300ms="pagina = 1; recargar()">
            </div>
            <select x-model="filtroCliente" @change="pagina = 1; recargar()">
              <option value="all">All clients</option>
              <template x-for="c in clientesDropdown" :key="c.id">
                <option :value="c.id" x-text="formatNombreCliente(c)"></option>
              </template>
            </select>
            <button class="btn btn-primary btn-new" @click="abrirNuevo()">
              <i data-lucide="plus"></i>
              New Invoice
            </button>
          </div>

          <!-- Tabla -->
          <div class="clients-table-wrapper">
            <table class="clients-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Date</th>
                  <th>Client</th>
                  <th>Description</th>
                  <th style="text-align:right">Total</th>
                  <th>Status</th>
                  <th></th>
                </tr>
              </thead>
              <tbody>

                <!-- Skeleton loading -->
                <template x-if="cargando">
                  <template x-for="i in 5">
                    <tr class="skeleton-row">
                      <td><span class="skeleton-bar" style="width: 40px"></span></td>
                      <td><span class="skeleton-bar" style="width: 90px"></span></td>
                      <td><span class="skeleton-bar" style="width: 150px"></span></td>
                      <td><span class="skeleton-bar" style="width: 200px"></span></td>
                      <td><span class="skeleton-bar" style="width: 70px"></span></td>
                      <td><span class="skeleton-bar" style="width: 70px"></span></td>
                      <td></td>
                    </tr>
                  </template>
                </template>

                <!-- Empty state -->
                <template x-if="!cargando && facturas.length === 0">
                  <tr>
                    <td colspan="7">
                      <div class="empty-state">
                        <i data-lucide="file-text"></i>
                        <h3>No invoices yet</h3>
                        <p>Get started by creating your first invoice.</p>
                      </div>
                    </td>
                  </tr>
                </template>

                <!-- Filas -->
                <template x-for="f in facturas" :key="f.id">
                  <tr @click="abrirEditar(f.id)">
                    <td>
                      <template x-if="f.numero">
                        <span class="inv-number" x-text="`#${f.numero}`"></span>
                      </template>
                      <template x-if="!f.numero">
                        <span class="inv-number-draft">—</span>
                      </template>
                    </td>
                    <td x-text="formatFecha(f.fecha)"></td>
                    <td>
                      <span x-text="formatNombreCliente(f.clientes)"></span>
                    </td>
                    <td>
                      <span x-text="truncar(f.descripcion_general)"
                            style="color: var(--color-text-muted); font-size: var(--text-sm)"></span>
                    </td>
                    <td style="text-align:right">
                      <strong x-text="formatMoneda(f.total_due)"></strong>
                    </td>
                    <td>
                      <span class="badge-estado"
                            :class="`badge-status-${f.estado}`"
                            x-text="estadoLabel(f.estado)"></span>
                    </td>
                    <td>
                      <div class="row-actions" @click.stop>
                        <!-- Draft: editar, preview, generar, eliminar -->
                        <template x-if="f.estado === 'borrador'">
                          <div style="display:contents">
                            <button @click="abrirEditar(f.id)" title="Editar draft">
                              <i data-lucide="pencil"></i>
                            </button>
                            <button @click="window.open('./print.html?draftId='+f.id+'&preview=true','_blank')" title="Vista previa">
                              <i data-lucide="eye"></i>
                            </button>
                            <button @click="generarDesdeFilaInvoice(f)" title="Generar factura final"
                                    style="color:var(--color-accent)">
                              <i data-lucide="zap"></i>
                            </button>
                            <button @click="confirmarEliminar(f)" title="Eliminar draft"
                                    style="color:var(--color-danger)">
                              <i data-lucide="trash-2"></i>
                            </button>
                          </div>
                        </template>
                        <!-- Generada: ver/imprimir, anular -->
                        <template x-if="f.estado === 'generada'">
                          <div style="display:contents">
                            <button @click="window.open('./print.html?id='+f.id,'_blank')" title="Ver / Imprimir">
                              <i data-lucide="eye"></i>
                            </button>
                            <button @click="anularFila(f)" title="Anular factura"
                                    style="color:var(--color-danger)">
                              <i data-lucide="x-circle"></i>
                            </button>
                          </div>
                        </template>
                        <!-- Enviada / Pagada / Anulada: solo ver -->
                        <template x-if="f.estado !== 'borrador' && f.estado !== 'generada'">
                          <div style="display:contents">
                            <button @click="window.open('./print.html?id='+f.id,'_blank')" title="Ver / Imprimir">
                              <i data-lucide="eye"></i>
                            </button>
                          </div>
                        </template>
                      </div>
                    </td>
                  </tr>
                </template>

              </tbody>
            </table>
          </div>

          <!-- Paginación -->
          <div class="pagination" x-show="totalPaginas > 1">
            <div>Showing <strong x-text="rangoMostrado()"></strong> of <strong x-text="total"></strong></div>
            <div class="pagination-controls">
              <button @click="irPagina(pagina - 1)" :disabled="pagina === 1">
                <i data-lucide="chevron-left" style="width:14px;height:14px"></i>
              </button>
              <template x-for="n in numerosPagina()">
                <button @click="irPagina(n)" :class="n === pagina ? 'active' : ''" x-text="n"></button>
              </template>
              <button @click="irPagina(pagina + 1)" :disabled="pagina === totalPaginas">
                <i data-lucide="chevron-right" style="width:14px;height:14px"></i>
              </button>
            </div>
          </div>

          <!-- ─── Modal ─────────────────────────────── -->
          <div class="modal-overlay" x-show="modalAbierto" @click.self="cerrarModal()" x-cloak>
            <div class="modal-form" style="max-width: 880px">
              <div class="modal-header">
                <h2 x-text="formData.id ? 'Edit Invoice' : 'New Invoice'"></h2>
                <button class="modal-close" @click="cerrarModal()">
                  <i data-lucide="x"></i>
                </button>
              </div>

              <div class="modal-body">

                <!-- Basic Information -->
                <div class="form-section">
                  <h3><i data-lucide="info"></i> Basic Information</h3>
                  <div class="form-grid-2">
                    <div class="field">
                      <label class="field-label">Client <span class="required">*</span></label>
                      <select x-model="formData.cliente_id" @change="onClienteChange()">
                        <option value="">— Select client —</option>
                        <template x-for="c in clientesDropdown" :key="c.id">
                          <option :value="c.id" x-text="formatNombreCliente(c)"></option>
                        </template>
                      </select>
                    </div>
                    <div class="field">
                      <label class="field-label">Invoice Date <span class="required">*</span></label>
                      <input type="date" :value="formData.fecha"
                             @change="formData.fecha = $event.target.value">
                    </div>
                  </div>
                </div>

                <!-- Bill To -->
                <div class="form-section">
                  <h3><i data-lucide="user"></i> Bill To</h3>
                  <div class="form-grid-2">
                    <div class="field">
                      <label class="field-label">Name</label>
                      <input type="text" x-model="formData.bill_to_name"
                             placeholder="Full name or company name">
                    </div>
                    <div class="field">
                      <label class="field-label">Email</label>
                      <input type="email" x-model="formData.bill_to_email"
                             placeholder="billing@example.com">
                    </div>
                  </div>
                  <div class="field">
                    <label class="field-label">Address Line 1</label>
                    <input type="text" x-model="formData.bill_to_address_1"
                           placeholder="Street address">
                  </div>
                  <div class="field">
                    <label class="field-label">Address Line 2</label>
                    <input type="text" x-model="formData.bill_to_address_2"
                           placeholder="Apt, suite, unit (optional)">
                  </div>
                  <div class="form-grid-3">
                    <div class="field">
                      <label class="field-label">City</label>
                      <input type="text" x-model="formData.bill_to_city" placeholder="City">
                    </div>
                    <div class="field">
                      <label class="field-label">State</label>
                      <input type="text" x-model="formData.bill_to_state" placeholder="FL" maxlength="2">
                    </div>
                    <div class="field">
                      <label class="field-label">ZIP</label>
                      <input type="text" x-model="formData.bill_to_zip" placeholder="33140" maxlength="10">
                    </div>
                  </div>
                </div>

                <!-- FOR section -->
                <div class="form-section">
                  <h3><i data-lucide="file-text"></i> FOR (visible on invoice)</h3>
                  <div class="field">
                    <label class="field-label">Property</label>
                    <select x-model="formData.propiedad_id" @change="onPropiedadChange()">
                      <option value="">— Select property (optional) —</option>
                      <template x-for="p in propiedadesDropdown" :key="p.id">
                        <option :value="p.id" x-text="p.unidad ? `${p.nombre_referencia} – ${p.unidad}` : p.nombre_referencia"></option>
                      </template>
                    </select>
                  </div>
                  <div class="field">
                    <label class="field-label">Property / Unit (on PDF)</label>
                    <input type="text" x-model="formData.for_property_unit"
                           placeholder="e.g. Alfonsina – Unit 4B">
                  </div>
                  <div class="field">
                    <label class="field-label">Service Period</label>
                    <input type="text" x-model="formData.for_service_period"
                           placeholder="e.g. September 2025">
                  </div>
                  <div class="field">
                    <label class="field-label">Description</label>
                    <textarea x-model="formData.for_description" rows="2"
                              placeholder="Additional details visible on the invoice"></textarea>
                  </div>
                </div>

                <!-- Line Items -->
                <div class="form-section">
                  <h3><i data-lucide="list"></i> Line Items</h3>

                  <div class="invoice-lines-list">
                    <!-- Header de columnas -->
                    <div class="invoice-line-row"
                         style="border: none; background: transparent; padding-top: 0; padding-bottom: 0">
                      <div class="section-for-label">Date</div>
                      <div class="section-for-label">Description</div>
                      <div class="section-for-label">Qty</div>
                      <div class="section-for-label">Unit Price</div>
                      <div class="section-for-label" style="text-align:right">Total</div>
                      <div></div>
                    </div>

                    <template x-for="(linea, idx) in lineas" :key="idx">
                      <div class="invoice-line-row">
                        <div class="field">
                          <input type="date" :value="linea.fecha"
                                 @change="linea.fecha = $event.target.value">
                        </div>
                        <div class="field">
                          <input type="text" x-model="linea.descripcion"
                                 placeholder="Service description" required>
                        </div>
                        <div class="field">
                          <input type="number" x-model="linea.qty"
                                 step="0.5" min="0" placeholder="1">
                        </div>
                        <div class="field">
                          <input type="number" x-model="linea.precio_unitario"
                                 step="0.01" min="0" placeholder="0.00">
                        </div>
                        <div class="total-cell" x-text="formatMoneda(totalLinea(linea))"></div>
                        <button class="delete-btn" @click="eliminarLinea(idx)" title="Remove line">
                          <i data-lucide="trash-2" style="width:14px;height:14px"></i>
                        </button>
                      </div>
                    </template>
                  </div>

                  <button class="btn-add-inline" @click="agregarLinea()" style="margin-top: 8px">
                    <i data-lucide="plus"></i> Add Line
                  </button>

                  <!-- Total Due -->
                  <div class="invoice-total-due" x-show="lineas.length > 0">
                    <span class="invoice-total-due-label">Total Due</span>
                    <span class="invoice-total-due-amount" x-text="formatMoneda(totalDue)"></span>
                  </div>
                </div>

                <!-- Internal Notes -->
                <div class="form-section">
                  <h3><i data-lucide="lock"></i> Internal Notes</h3>
                  <div class="field">
                    <textarea x-model="formData.notas" rows="2"
                              placeholder="Internal notes — not shown on the invoice PDF"></textarea>
                    <span class="field-help">Only visible to admin team.</span>
                  </div>
                </div>

              </div>

              <div class="modal-footer">
                <button class="btn btn-ghost" @click="cerrarModal()" :disabled="guardando || generando">Cancel</button>

                <!-- Delete draft (solo borrador guardado) -->
                <button class="btn-void" x-show="formData.id && formData.estado === 'borrador'"
                        @click="eliminarDesdeModal()" :disabled="guardando || generando" style="display:none">
                  <i data-lucide="trash-2"></i>
                  Delete
                </button>

                <!-- Open Invoice (generada / enviada / pagada / anulada) -->
                <button class="btn btn-ghost"
                        x-show="formData.id && formData.estado !== 'borrador'"
                        @click="window.open('./print.html?id='+formData.id, '_blank')"
                        style="display:none">
                  <i data-lucide="printer"></i>
                  Open Invoice
                </button>

                <!-- Void (solo generada) -->
                <button class="btn-void" x-show="formData.id && formData.estado === 'generada'"
                        @click="anular()" :disabled="generando" style="display:none">
                  <i data-lucide="x-circle"></i>
                  Void Invoice
                </button>

                <!-- Preview (solo borrador guardado) -->
                <button class="btn btn-ghost"
                        x-show="formData.id && formData.estado === 'borrador'"
                        @click="abrirPreview()" :disabled="guardando || generando" style="display:none">
                  <i data-lucide="eye"></i>
                  Preview
                </button>

                <!-- Save Draft (solo borrador) -->
                <button class="btn btn-ghost" x-show="formData.estado === 'borrador'"
                        @click="guardar()" :disabled="guardando || generando" style="display:none">
                  <span x-text="guardando ? 'Saving...' : 'Save Draft'"></span>
                </button>

                <!-- Generate Final (solo borrador guardado) -->
                <button class="btn btn-primary"
                        x-show="formData.id && formData.estado === 'borrador'"
                        @click="generarFinal()" :disabled="guardando || generando" style="display:none">
                  <i data-lucide="zap"></i>
                  <span x-text="generando ? 'Generating...' : 'Generate Final'"></span>
                </button>
              </div>
            </div>
          </div>

          <!-- ─── Confirm con "no volver a mostrar" ──────── -->
          <div x-show="confirmSuppress.abierto" x-cloak
               style="position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:1100;display:flex;align-items:center;justify-content:center;padding:16px">
            <div style="background:white;border-radius:10px;padding:24px;max-width:400px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,0.3)">
              <h3 x-text="confirmSuppress.titulo"
                  style="font-size:15px;font-weight:600;margin-bottom:8px;color:#0a1628"></h3>
              <p x-text="confirmSuppress.mensaje"
                 style="font-size:13px;color:#555;margin-bottom:16px;line-height:1.5"></p>
              <label style="display:flex;align-items:center;gap:8px;font-size:12px;color:#777;margin-bottom:20px;cursor:pointer">
                <input type="checkbox" x-model="confirmSuppress.checked">
                Don't show this warning again
              </label>
              <div style="display:flex;gap:8px;justify-content:flex-end">
                <button class="btn btn-ghost" @click="confirmSuppressCancel()"
                        style="font-size:13px;padding:7px 14px">Cancel</button>
                <button class="btn btn-primary" @click="confirmSuppressOk()"
                        style="font-size:13px;padding:7px 14px">Continue</button>
              </div>
            </div>
          </div>

          <!-- Toasts -->
          <div class="toast-container">
            <template x-for="t in toasts" :key="t.id">
              <div class="toast" :class="`toast-${t.tipo}`" x-text="t.mensaje"></div>
            </template>
          </div>

        </div>
      </div>
    </main>
  </div>

  <script type="module">
    import { iniciarPanel } from '../js/panel-shell.js';
    import {
      listarFacturas, obtenerFactura, crearFactura, actualizarFactura,
      eliminarFactura, listarClientesActivos, listarPropiedadesCliente,
      traducirError, obtenerClienteParaFactura,
      generarNumero, anularFactura
    } from './js/invoices-api.js';

    (async () => {
      const usuario = await iniciarPanel({
        rolesPermitidos: ['superadmin', 'owner', 'admin'],
        itemActivo: 'invoices',
        tituloHeader: 'Invoices'
      });
      if (!usuario) return;

      window.invoicesPage = function () {
        return {
          // ─── Estado ──────────────────────────────────
          facturas: [],
          total: 0,
          cargando: true,
          vista: 'drafts',
          busqueda: '',
          filtroCliente: 'all',
          pagina: 1,
          porPagina: 20,

          clientesDropdown: [],
          propiedadesDropdown: [],

          modalAbierto: false,
          guardando: false,
          generando: false,
          formData: {},
          lineas: [],

          confirmSuppress: { abierto: false, titulo: '', mensaje: '', suppressKey: '', checked: false, _resolve: null },

          toasts: [],

          // ─── Helpers de inicialización ───────────────
          formDataVacio() {
            return {
              id: null,
              numero: null,
              cliente_id: '',
              fecha: new Date().toISOString().split('T')[0],
              bill_to_name: '',
              bill_to_email: '',
              bill_to_address_1: '',
              bill_to_address_2: '',
              bill_to_city: '',
              bill_to_state: '',
              bill_to_zip: '',
              propiedad_id: '',
              for_property_unit: '',
              for_service_period: '',
              for_description: '',
              notas: '',
              estado: 'borrador',
              pdf_url: null,
              version: 1
            };
          },

          lineaVacia() {
            return { fecha: new Date().toISOString().split('T')[0], descripcion: '', qty: 1, precio_unitario: 0 };
          },

          // ─── Ciclo de vida ───────────────────────────
          async init() {
            this.formData = this.formDataVacio();
            await this.cargarClientes();
            await this.recargar();
          },

          async cargarClientes() {
            const { data } = await listarClientesActivos();
            this.clientesDropdown = data;
          },

          async recargar() {
            const mapaEstado = {
              drafts: 'borrador', generated: 'generada',
              sent: 'enviada', paid: 'pagada', all: 'all'
            };
            const estado = mapaEstado[this.vista] || 'all';

            this.cargando = true;
            const { data, count, error } = await listarFacturas({
              busqueda: this.busqueda,
              estado,
              cliente_id: this.filtroCliente,
              pagina: this.pagina,
              porPagina: this.porPagina
            });

            if (error) {
              this.mostrarToast('error', traducirError(error));
              this.cargando = false;
              return;
            }

            this.facturas = data;
            this.total = count;
            this.cargando = false;
            this.$nextTick(() => window.lucide?.createIcons());
          },

          cambiarVista(v) {
            this.vista = v;
            this.pagina = 1;
            this.recargar();
          },

          // ─── Getters de cálculo ──────────────────────
          totalLinea(linea) {
            return (parseFloat(linea.qty) || 0) * (parseFloat(linea.precio_unitario) || 0);
          },

          get subtotal() {
            return this.lineas.reduce((acc, l) => acc + this.totalLinea(l), 0);
          },

          get totalDue() {
            return this.subtotal;
          },

          // ─── Formato ─────────────────────────────────
          formatNombreCliente(c) {
            if (!c) return '—';
            const base = `${c.nombre || ''} ${c.apellido || ''}`.trim();
            return c.razon_social ? `${c.razon_social} (${base})` : base;
          },

          formatMoneda(n) {
            if (n === null || n === undefined || isNaN(n)) return '—';
            return `$${Number(n).toFixed(2).replace(/\B(?=(\d{3})+(?!\d))/g, ',')}`;
          },

          formatFecha(iso) {
            if (!iso) return '—';
            // fecha es DATE (YYYY-MM-DD); T12:00:00 evita timezone shift al formatear
            const d = new Date(iso + 'T12:00:00');
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
          },

          truncar(s, n = 50) {
            if (!s) return '—';
            return s.length > n ? s.substring(0, n) + '…' : s;
          },

          estadoLabel(e) {
            const m = {
              borrador: 'Draft', generada: 'Generated',
              enviada: 'Sent', pagada: 'Paid', anulada: 'Anulada'
            };
            return m[e] || e;
          },

          // ─── Modal ───────────────────────────────────
          abrirNuevo() {
            this.formData = this.formDataVacio();
            this.lineas = [this.lineaVacia()];
            this.propiedadesDropdown = [];
            this.modalAbierto = true;
            this.$nextTick(() => window.lucide?.createIcons());
          },

          async abrirEditar(id) {
            this.modalAbierto = true;
            const { factura, error } = await obtenerFactura(id);
            if (error) {
              this.mostrarToast('error', traducirError(error));
              this.modalAbierto = false;
              return;
            }

            this.formData = {
              id:                 factura.id,
              numero:             factura.numero,
              cliente_id:         factura.cliente_id,
              fecha:              factura.fecha,
              bill_to_name:       factura.bill_to_name      || '',
              bill_to_email:      factura.bill_to_email     || '',
              bill_to_address_1:  factura.bill_to_address_1 || '',
              bill_to_address_2:  factura.bill_to_address_2 || '',
              bill_to_city:       factura.bill_to_city      || '',
              bill_to_state:      factura.bill_to_state     || '',
              bill_to_zip:        factura.bill_to_zip       || '',
              propiedad_id:       factura.propiedad_id      || '',
              for_property_unit:  factura.for_property_unit  || '',
              for_service_period: factura.for_service_period || '',
              for_description:    factura.for_description    || '',
              notas:              factura.notas    || '',
              estado:             factura.estado,
              pdf_url:            factura.pdf_url  || null,
              version:            factura.version
            };

            // Cargar propiedades del cliente
            if (factura.cliente_id) {
              const { data: props } = await listarPropiedadesCliente(factura.cliente_id);
              this.propiedadesDropdown = props;
            }

            this.lineas = (factura.factura_lineas || []).map(l => ({
              id:              l.id,
              fecha:           l.fecha || '',
              descripcion:     l.descripcion || '',
              qty:             l.qty,
              precio_unitario: l.precio_unitario
            }));

            if (this.lineas.length === 0) this.lineas = [this.lineaVacia()];

            this.$nextTick(() => window.lucide?.createIcons());
          },

          cerrarModal() {
            this.modalAbierto = false;
          },

          // ─── Líneas ──────────────────────────────────
          agregarLinea() {
            this.lineas.push(this.lineaVacia());
            this.$nextTick(() => window.lucide?.createIcons());
          },

          eliminarLinea(idx) {
            this.lineas.splice(idx, 1);
            if (this.lineas.length === 0) this.lineas = [this.lineaVacia()];
          },

          // ─── Guardar ─────────────────────────────────
          async guardar() {
            const f = this.formData;

            if (!f.cliente_id) {
              this.mostrarToast('error', 'Please select a client.');
              return;
            }
            if (!f.fecha) {
              this.mostrarToast('error', 'Invoice date is required.');
              return;
            }
            const lineasValidas = this.lineas.filter(l => l.descripcion?.trim());
            if (lineasValidas.length === 0) {
              this.mostrarToast('error', 'Add at least one line with a description.');
              return;
            }

            this.guardando = true;

            const subtotal = lineasValidas.reduce((acc, l) =>
              acc + (parseFloat(l.qty) || 0) * (parseFloat(l.precio_unitario) || 0), 0
            );

            const datosFactura = {
              cliente_id:         f.cliente_id,
              fecha:              f.fecha,
              bill_to_name:       f.bill_to_name?.trim()      || null,
              bill_to_email:      f.bill_to_email?.trim()     || null,
              bill_to_address_1:  f.bill_to_address_1?.trim() || null,
              bill_to_address_2:  f.bill_to_address_2?.trim() || null,
              bill_to_city:       f.bill_to_city?.trim()      || null,
              bill_to_state:      f.bill_to_state?.trim()     || null,
              bill_to_zip:        f.bill_to_zip?.trim()       || null,
              propiedad_id:       f.propiedad_id              || null,
              for_property_unit:  f.for_property_unit?.trim()  || null,
              for_service_period: f.for_service_period?.trim() || null,
              for_description:    f.for_description?.trim()    || null,
              subtotal,
              descuento_total:  0,
              tax_total:        0,
              total_due:        subtotal,
              notas:            f.notas?.trim() || null
            };

            const lineasParaGuardar = lineasValidas.map((l, idx) => ({
              fecha:           l.fecha || null,
              descripcion:     l.descripcion.trim(),
              qty:             parseFloat(l.qty) || 1,
              precio_unitario: parseFloat(l.precio_unitario) || 0,
              descuento:       0,
              taxable:         false,
              tax_pct:         0,
              tax_monto:       0,
              total:           (parseFloat(l.qty) || 0) * (parseFloat(l.precio_unitario) || 0),
              orden:           idx + 1
              // os_id, os_servicio_id: omitir (NULL — líneas manuales)
            }));

            let error;
            if (f.id) {
              ({ error } = await actualizarFactura(f.id, datosFactura, lineasParaGuardar, f.version));
            } else {
              ({ error } = await crearFactura(datosFactura, lineasParaGuardar));
            }

            this.guardando = false;

            if (error) {
              this.mostrarToast('error', traducirError(error));
              return;
            }

            this.modalAbierto = false;
            this.mostrarToast('success', f.id ? 'Invoice updated' : 'Draft created');
            await this.recargar();
          },

          // ─── Eliminar ────────────────────────────────
          async confirmarEliminar(factura) {
            if (factura.estado !== 'borrador') { this.mostrarToast('error', 'Only drafts can be deleted.'); return; }
            const ok = await this.mostrarConfirmSuppress(
              'Delete Draft',
              'Vas a borrar este draft definitivamente. Esta acción no se puede deshacer.',
              'ak.suppress_delete_warning'
            );
            if (!ok) return;
            const { error } = await eliminarFactura(factura.id);
            if (error) { this.mostrarToast('error', traducirError(error)); return; }
            this.mostrarToast('success', 'Draft deleted');
            await this.recargar();
          },

          // ─── Paginación ──────────────────────────────
          get totalPaginas() {
            return Math.max(1, Math.ceil(this.total / this.porPagina));
          },

          rangoMostrado() {
            if (this.total === 0) return '0';
            const desde = (this.pagina - 1) * this.porPagina + 1;
            const hasta = Math.min(this.pagina * this.porPagina, this.total);
            return `${desde}-${hasta}`;
          },

          numerosPagina() {
            const t = this.totalPaginas;
            const p = this.pagina;
            const arr = [];
            const inicio = Math.max(1, p - 2);
            const fin = Math.min(t, inicio + 4);
            for (let i = inicio; i <= fin; i++) arr.push(i);
            return arr;
          },

          irPagina(n) {
            if (n < 1 || n > this.totalPaginas) return;
            this.pagina = n;
            this.recargar();
          },

          // ─── onChange helpers ────────────────────────
          async onClienteChange() {
            const cid = this.formData.cliente_id;
            if (!cid) {
              this.propiedadesDropdown = [];
              this.formData.propiedad_id = '';
              return;
            }
            // Auto-fill bill_to desde el cliente
            const { cliente } = await obtenerClienteParaFactura(cid);
            if (cliente) {
              this.formData.bill_to_name      = cliente.bill_to_name      || `${cliente.nombre || ''} ${cliente.apellido || ''}`.trim();
              this.formData.bill_to_email     = cliente.bill_to_email     || cliente.email || '';
              this.formData.bill_to_address_1 = cliente.bill_to_address_1 || '';
              this.formData.bill_to_address_2 = cliente.bill_to_address_2 || '';
              this.formData.bill_to_city      = cliente.bill_to_city      || '';
              this.formData.bill_to_state     = cliente.bill_to_state     || '';
              this.formData.bill_to_zip       = cliente.bill_to_zip       || '';
            }
            // Cargar propiedades del cliente
            const { data: props } = await listarPropiedadesCliente(cid);
            this.propiedadesDropdown = props;
            this.formData.propiedad_id = '';
          },

          onPropiedadChange() {
            const pid = this.formData.propiedad_id;
            if (!pid) return;
            const prop = this.propiedadesDropdown.find(p => p.id === pid);
            if (prop) {
              this.formData.for_property_unit = prop.unidad
                ? `${prop.nombre_referencia} – ${prop.unidad}`
                : prop.nombre_referencia;
            }
          },

          // ─── Eliminar desde modal ────────────────────
          async eliminarDesdeModal() {
            if (this.formData.estado !== 'borrador') return;
            const ok = await this.mostrarConfirmSuppress(
              'Delete Draft',
              'Vas a borrar este draft definitivamente. Esta acción no se puede deshacer.',
              'ak.suppress_delete_warning'
            );
            if (!ok) return;
            const { error } = await eliminarFactura(this.formData.id);
            if (error) { this.mostrarToast('error', traducirError(error)); return; }
            this.modalAbierto = false;
            this.mostrarToast('success', 'Draft deleted');
            await this.recargar();
          },

          // ─── Generate Final ──────────────────────────
          async generarFinal() {
            const ok = await this.mostrarConfirmSuppress(
              'Generate Final Invoice',
              'Vas a asignar el siguiente número correlativo y generar la factura final. Esta acción es irreversible.',
              'ak.suppress_generate_warning'
            );
            if (!ok) return;

            this.generando = true;
            try {
              const { numero, error } = await generarNumero(this.formData.id, this.formData.version);
              if (error) throw error;
              this.mostrarToast('success', `Invoice #${numero} generated`);
              window.open(`./print.html?id=${this.formData.id}`, '_blank');
              this.modalAbierto = false;
              await this.recargar();
            } catch (err) {
              this.mostrarToast('error', traducirError(err));
            } finally {
              this.generando = false;
            }
          },

          // ─── Generate desde fila ─────────────────────
          async generarDesdeFilaInvoice(factura) {
            const ok = await this.mostrarConfirmSuppress(
              'Generate Final Invoice',
              'Vas a asignar el siguiente número correlativo y generar la factura final. Esta acción es irreversible.',
              'ak.suppress_generate_warning'
            );
            if (!ok) return;

            this.generando = true;
            try {
              const { numero, error } = await generarNumero(factura.id, factura.version);
              if (error) throw error;
              this.mostrarToast('success', `Invoice #${numero} generated`);
              window.open(`./print.html?id=${factura.id}`, '_blank');
              await this.recargar();
            } catch (err) {
              this.mostrarToast('error', traducirError(err));
            } finally {
              this.generando = false;
            }
          },

          // ─── Anular desde fila ───────────────────────
          async anularFila(factura) {
            const ok = await this.mostrarConfirmSuppress(
              'Void Invoice',
              `Vas a anular la factura N° ${factura.numero}. El número queda registrado como hueco. Esta acción es irreversible.`,
              'ak.suppress_void_warning'
            );
            if (!ok) return;

            this.generando = true;
            const { factura: fresh, error: errFetch } = await obtenerFactura(factura.id);
            if (errFetch || !fresh) {
              this.mostrarToast('error', 'Could not load invoice. Please reload.');
              this.generando = false;
              return;
            }
            const { error } = await anularFactura(fresh.id, fresh.version);
            this.generando = false;
            if (error) { this.mostrarToast('error', traducirError(error)); return; }
            this.mostrarToast('success', 'Invoice voided');
            await this.recargar();
          },

          // ─── Anular ──────────────────────────────────
          async anular() {
            const nro = this.formData.numero;
            const ok = await this.mostrarConfirmSuppress(
              'Void Invoice',
              `Vas a anular la factura N° ${nro}. El número queda registrado como hueco. Esta acción es irreversible.`,
              'ak.suppress_void_warning'
            );
            if (!ok) return;
            this.generando = true;
            const { error } = await anularFactura(this.formData.id, this.formData.version);
            this.generando = false;
            if (error) { this.mostrarToast('error', traducirError(error)); return; }
            this.modalAbierto = false;
            this.mostrarToast('success', 'Invoice voided');
            await this.recargar();
          },

          // ─── Confirm con suppress ────────────────────
          mostrarConfirmSuppress(titulo, mensaje, suppressKey) {
            if (localStorage.getItem(suppressKey) === 'true') return Promise.resolve(true);
            return new Promise(resolve => {
              this.confirmSuppress = { abierto: true, titulo, mensaje, suppressKey, checked: false, _resolve: resolve };
            });
          },

          confirmSuppressOk() {
            if (this.confirmSuppress.checked) localStorage.setItem(this.confirmSuppress.suppressKey, 'true');
            const resolve = this.confirmSuppress._resolve;
            this.confirmSuppress.abierto = false;
            resolve(true);
          },

          confirmSuppressCancel() {
            const resolve = this.confirmSuppress._resolve;
            this.confirmSuppress.abierto = false;
            resolve(false);
          },

          // ─── Preview borrador ────────────────────────
          async abrirPreview() {
            const id = await this.guardarSilencioso();
            if (!id) return;
            window.open(`./print.html?draftId=${id}&preview=true`, '_blank');
          },

          async guardarSilencioso() {
            const f = this.formData;
            if (!f.cliente_id) { this.mostrarToast('error', 'Please select a client.'); return false; }
            if (!f.fecha)       { this.mostrarToast('error', 'Invoice date is required.'); return false; }
            const lineasValidas = this.lineas.filter(l => l.descripcion?.trim());
            if (lineasValidas.length === 0) { this.mostrarToast('error', 'Add at least one line with a description.'); return false; }

            this.guardando = true;
            const subtotal = lineasValidas.reduce((acc, l) =>
              acc + (parseFloat(l.qty) || 0) * (parseFloat(l.precio_unitario) || 0), 0);
            const datosFactura = {
              cliente_id: f.cliente_id, fecha: f.fecha,
              bill_to_name: f.bill_to_name?.trim() || null, bill_to_email: f.bill_to_email?.trim() || null,
              bill_to_address_1: f.bill_to_address_1?.trim() || null, bill_to_address_2: f.bill_to_address_2?.trim() || null,
              bill_to_city: f.bill_to_city?.trim() || null, bill_to_state: f.bill_to_state?.trim() || null,
              bill_to_zip: f.bill_to_zip?.trim() || null, propiedad_id: f.propiedad_id || null,
              for_property_unit: f.for_property_unit?.trim() || null, for_service_period: f.for_service_period?.trim() || null,
              for_description: f.for_description?.trim() || null,
              subtotal, descuento_total: 0, tax_total: 0, total_due: subtotal,
              notas: f.notas?.trim() || null
            };
            const lineasParaGuardar = lineasValidas.map((l, idx) => ({
              fecha: l.fecha || null, descripcion: l.descripcion.trim(),
              qty: parseFloat(l.qty) || 1, precio_unitario: parseFloat(l.precio_unitario) || 0,
              descuento: 0, taxable: false, tax_pct: 0, tax_monto: 0,
              total: (parseFloat(l.qty) || 0) * (parseFloat(l.precio_unitario) || 0), orden: idx + 1
            }));

            let error, facturaId = f.id;
            if (f.id) {
              ({ error } = await actualizarFactura(f.id, datosFactura, lineasParaGuardar, f.version));
            } else {
              const { factura, error: err } = await crearFactura(datosFactura, lineasParaGuardar);
              error = err;
              if (!err && factura) facturaId = factura.id;
            }
            this.guardando = false;
            if (error) { this.mostrarToast('error', traducirError(error)); return false; }

            // Refrescar version/id para evitar stale lock
            const { factura: fresh } = await obtenerFactura(facturaId);
            if (fresh) { this.formData.id = fresh.id; this.formData.version = fresh.version; }

            this.mostrarToast('success', 'Draft saved');
            return facturaId;
          },

          // ─── Toasts ──────────────────────────────────
          mostrarToast(tipo, mensaje) {
            const id = Date.now() + Math.random();
            this.toasts.push({ id, tipo, mensaje });
            setTimeout(() => { this.toasts = this.toasts.filter(t => t.id !== id); }, 3500);
          }
        };
      };

      const Alpine = (await import('https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/module.esm.js')).default;
      window.Alpine = Alpine;
      Alpine.start();
      setTimeout(() => window.lucide?.createIcons(), 50);
    })();
  </script>
</body>
</html>
