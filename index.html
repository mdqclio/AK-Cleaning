<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AK Cleaning & Management</title>
  <link rel="stylesheet" href="css/base.css">
  <link rel="stylesheet" href="css/components.css">
  <script src="config.js"></script>
</head>
<body>
  <div class="welcome">
    <div class="brand-circle">AK</div>
    <h1>AK Cleaning & Management</h1>
    <p>Internal management system</p>
    <a href="login.html" class="btn btn-primary btn-lg">Sign In</a>
  </div>

  <script type="module">
    import { obtenerSesionActual } from './js/auth.js';
    import { redirigirSegunRol } from './js/router.js';

    // Si ya hay sesión, redirigir al panel del rol
    const sesion = await obtenerSesionActual();
    if (sesion && sesion.usuario) {
      redirigirSegunRol(sesion.usuario);
    }
  </script>

  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--color-bg) 0%, #ede9df 100%);
    }
    .welcome {
      text-align: center;
    }
    .brand-circle {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: var(--color-primary);
      color: var(--color-accent);
      font-family: var(--font-display);
      font-size: 40px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto var(--space-lg);
      letter-spacing: 1px;
    }
    .welcome h1 {
      margin-bottom: var(--space-xs);
      color: var(--color-primary);
    }
    .welcome p {
      color: var(--color-text-muted);
      margin-bottom: var(--space-xl);
    }
  </style>
</body>
</html>
